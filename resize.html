  <main id="main" class="main" role="main">
    <section aria-labelledby="rs-title">
      <div class="container">
        <div class="tool-header">
          <a href="index.html" class="back-link" aria-label="返回首頁"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg><span data-i18n="back">返回</span></a>
          <h1 id="rs-title" data-i18n="tools.resize.title">尺寸調整</h1>
        </div>
        <div class="tool-layout">
          <div class="tool-sidebar">
            <div class="upload-zone" id="rs-upload" role="button" tabindex="0" aria-label="點擊或拖曳圖片上傳">
              <input type="file" accept="image/*" class="upload-input" id="rs-file" aria-label="選擇圖片檔案">
              <div class="upload-content"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><p class="upload-text" data-i18n="upload.text">點擊或拖曳圖片至此</p><p class="upload-hint" data-i18n="upload.hint">支援 JPG、PNG、WebP</p></div>
            </div>
            <div class="settings-panel" id="rs-settings" hidden>
              <h2 class="settings-title" data-i18n="settings">設定</h2>
              <div class="setting-group"><label data-i18n="resize.originalSize">原始尺寸</label><p class="info-text" id="rs-original-size">—</p></div>
              <div class="setting-group"><label for="rs-width" data-i18n="resize.width">寬度 (px)</label><input type="number" id="rs-width" class="number-input full" min="1" max="10000" aria-label="寬度像素"></div>
              <div class="setting-group"><label for="rs-height" data-i18n="resize.height">高度 (px)</label><input type="number" id="rs-height" class="number-input full" min="1" max="10000" aria-label="高度像素"></div>
              <div class="setting-group"><label class="checkbox-label"><input type="checkbox" id="rs-lock-ratio" checked><span data-i18n="resize.lockRatio">鎖定比例</span></label></div>
              <div class="setting-group"><label for="rs-format" data-i18n="resize.format">輸出格式</label><select id="rs-format" class="select-input"><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WebP</option></select></div>
              <div class="btn-group"><button class="btn btn-primary" id="rs-process" data-i18n="btn.process">處理圖片</button><button class="btn btn-secondary" id="rs-reset" data-i18n="btn.reset">重設</button></div>
            </div>
          </div>
          <div class="preview-area" id="rs-preview-area" hidden>
            <h2 class="sr-only" data-i18n="preview">預覽</h2>
            <div class="preview-container"><canvas id="rs-canvas" aria-label="圖片預覽"></canvas></div>
            <div class="preview-info" id="rs-info"></div>
            <div class="btn-group"><button class="btn btn-primary" id="rs-download" data-i18n="btn.download">下載圖片</button></div>

  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script src="shared.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const { t, showToast, loadImage, canvasToBlob, downloadBlob, showProcessing, hideProcessing, setupUploadZone } = ToolWeb;
    let img=null, file=null, aspectRatio=1, updating=false;
    setupUploadZone('rs-upload','rs-file', async (files) => {
      file=files[0]; if(!file||!file.type.startsWith('image/')) return;
      img = await loadImage(file); aspectRatio=img.naturalWidth/img.naturalHeight;
      document.getElementById('rs-width').value=img.naturalWidth;
      document.getElementById('rs-height').value=img.naturalHeight;
      document.getElementById('rs-original-size').textContent=img.naturalWidth+' × '+img.naturalHeight+' px';
      document.getElementById('rs-settings').hidden=false;
      showToast(t('toast.uploaded'),'success');
    });
    const wI=document.getElementById('rs-width'), hI=document.getElementById('rs-height'), lock=document.getElementById('rs-lock-ratio');
    wI.addEventListener('input',()=>{ if(lock.checked&&!updating){updating=true;hI.value=Math.round(wI.value/aspectRatio);updating=false;} });
    hI.addEventListener('input',()=>{ if(lock.checked&&!updating){updating=true;wI.value=Math.round(hI.value*aspectRatio);updating=false;} });
    document.getElementById('rs-process').addEventListener('click', async()=>{
      if(!img){showToast(t('toast.noFile'),'error');return;} showProcessing(); await new Promise(r=>setTimeout(r,50));
      try{
        const w=parseInt(wI.value)||img.naturalWidth, h=parseInt(hI.value)||img.naturalHeight;
        const c=document.createElement('canvas');c.width=w;c.height=h;
        const ctx=c.getContext('2d');ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';ctx.drawImage(img,0,0,w,h);
        const pc=document.getElementById('rs-canvas');pc.width=w;pc.height=h;pc.getContext('2d').drawImage(c,0,0);
        document.getElementById('rs-preview-area').hidden=false;
        document.getElementById('rs-info').textContent=t('info.size',{w,h});
        showToast(t('toast.processed'),'success');
      }catch(e){showToast(t('toast.error'),'error');} hideProcessing();
    });
    document.getElementById('rs-download').addEventListener('click', async()=>{
      if(!img)return; const w=parseInt(wI.value)||img.naturalWidth,h=parseInt(hI.value)||img.naturalHeight,fmt=document.getElementById('rs-format').value;
      const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';ctx.drawImage(img,0,0,w,h);
      const ext=fmt==='jpeg'?'jpg':fmt; downloadBlob(await canvasToBlob(c,fmt,0.92), file.name.replace(/\.[^.]+$/,'')+`_${w}x${h}.${ext}`);
      showToast(t('toast.downloaded'),'success');
    });
    document.getElementById('rs-reset').addEventListener('click',()=>{
      img=null;file=null;document.getElementById('rs-file').value='';document.getElementById('rs-settings').hidden=true;
      document.getElementById('rs-preview-area').hidden=true;document.getElementById('rs-upload').classList.remove('has-file');
      const n=document.querySelector('#rs-upload .upload-filename');if(n)n.remove();
    });
  });
  </script>
</body>
