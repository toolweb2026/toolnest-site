  <main id="main" class="main" role="main">
    <section aria-labelledby="gc-title">
      <div class="container">
        <div class="tool-header">
          <a href="index.html" class="back-link" aria-label="返回首頁"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg><span data-i18n="back">返回</span></a>

        </div>
        <div class="tool-layout">
          <div class="tool-sidebar">
            <div class="upload-zone" id="gc-upload" role="button" tabindex="0" aria-label="點擊或拖曳圖片上傳">
              <input type="file" accept="image/*" class="upload-input" id="gc-file" aria-label="選擇圖片檔案">
              <div class="upload-content"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><p class="upload-text" data-i18n="upload.text">點擊或拖曳圖片至此</p><p class="upload-hint" data-i18n="upload.hint">支援 JPG、PNG、WebP</p></div>
            </div>
            <div class="settings-panel" id="gc-settings" hidden>
              <h2 class="settings-title" data-i18n="settings">設定</h2>
              <div class="setting-group"><label for="gc-grid" data-i18n="gridCut.gridType">切割方式</label>
                <select id="gc-grid" class="select-input"><option value="3x3" data-i18n="grid.3x3">3×3 九宮格</option><option value="2x2" data-i18n="grid.2x2">2×2 四宮格</option><option value="3x1" data-i18n="grid.3x1">3×1 橫切三張</option><option value="1x3" data-i18n="grid.1x3">1×3 直切三張</option></select>
              </div>
              <div class="setting-group"><label for="gc-format" data-i18n="gridCut.format">輸出格式</label>
                <select id="gc-format" class="select-input"><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WebP</option></select>
              </div>
              <div class="btn-group"><button class="btn btn-primary" id="gc-process" data-i18n="btn.cut">切割圖片</button><button class="btn btn-secondary" id="gc-reset" data-i18n="btn.reset">重設</button></div>
            </div>
          </div>
          <div class="preview-area" id="gc-preview-area" hidden>
            <h2 class="sr-only" data-i18n="preview">預覽</h2>

  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script src="shared.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const { t, showToast, loadImage, canvasToBlob, downloadBlob, showProcessing, hideProcessing, setupUploadZone } = ToolWeb;
    let img=null, file=null, cellCanvases=[];
    setupUploadZone('gc-upload','gc-file', async(files)=>{
      file=files[0]; if(!file||!file.type.startsWith('image/')) return;
      img=await loadImage(file); document.getElementById('gc-settings').hidden=false;
      showToast(t('toast.uploaded'),'success');
    });
    document.getElementById('gc-process').addEventListener('click', async()=>{
      if(!img){showToast(t('toast.noFile'),'error');return;} showProcessing(); await new Promise(r=>setTimeout(r,50));
      try{
        const [cols,rows]=document.getElementById('gc-grid').value.split('x').map(Number);
        let sw=img.naturalWidth,sh=img.naturalHeight,sx=0,sy=0;
        const tr=cols/rows, ir=sw/sh;
        if(ir>tr){sw=Math.round(sh*tr);sx=Math.round((img.naturalWidth-sw)/2);}
        else if(ir<tr){sh=Math.round(sw/tr);sy=Math.round((img.naturalHeight-sh)/2);}
        const cw=Math.floor(sw/cols),ch=Math.floor(sh/rows);
        cellCanvases=[];
        const pv=document.getElementById('gc-grid-preview'); pv.innerHTML=''; pv.className='grid-preview grid-'+cols+'x'+rows;
        let num=1;
        for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
          const cv=document.createElement('canvas');cv.width=cw;cv.height=ch;
          cv.getContext('2d').drawImage(img,sx+c*cw,sy+r*ch,cw,ch,0,0,cw,ch);
          cellCanvases.push(cv);
          const cell=document.createElement('div');cell.className='grid-cell';cell.tabIndex=0;cell.setAttribute('aria-label','下載第'+num+'張');
          const pcv=document.createElement('canvas');pcv.width=cw;pcv.height=ch;pcv.getContext('2d').drawImage(cv,0,0);cell.appendChild(pcv);
          const lb=document.createElement('span');lb.className='grid-cell-label';lb.textContent=num;cell.appendChild(lb);
          const idx=cellCanvases.length-1,n=num;
          cell.addEventListener('click',()=>dlCell(idx,n));
          cell.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();dlCell(idx,n);}});
          pv.appendChild(cell); num++;
        }
        document.getElementById('gc-preview-area').hidden=false;
        document.getElementById('gc-info').textContent=t('info.size',{w:cw,h:ch})+' × '+cellCanvases.length;
        showToast(t('toast.processed'),'success');
      }catch(e){showToast(t('toast.error'),'error');} hideProcessing();
    });
    async function dlCell(idx,num){
      const fmt=document.getElementById('gc-format').value,ext=fmt==='jpeg'?'jpg':fmt;
      downloadBlob(await canvasToBlob(cellCanvases[idx],fmt,0.92), file.name.replace(/\.[^.]+$/,'')+'_grid_'+num+'.'+ext);
    }
    document.getElementById('gc-download-all').addEventListener('click', async()=>{
      showProcessing(); const fmt=document.getElementById('gc-format').value,ext=fmt==='jpeg'?'jpg':fmt;
      for(let i=0;i<cellCanvases.length;i++){downloadBlob(await canvasToBlob(cellCanvases[i],fmt,0.92),file.name.replace(/\.[^.]+$/,'')+'_grid_'+(i+1)+'.'+ext);await new Promise(r=>setTimeout(r,100));}
      hideProcessing(); showToast(t('toast.downloaded'),'success');
    });
    document.getElementById('gc-reset').addEventListener('click',()=>{
      img=null;file=null;cellCanvases=[];document.getElementById('gc-file').value='';
      document.getElementById('gc-settings').hidden=true;document.getElementById('gc-preview-area').hidden=true;
      document.getElementById('gc-grid-preview').innerHTML='';document.getElementById('gc-upload').classList.remove('has-file');
      const n=document.querySelector('#gc-upload .upload-filename');if(n)n.remove();
    });
  });
  </script>
