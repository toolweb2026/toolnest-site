<!DOCTYPE html>

  <meta charset="UTF-8">

</head>

        </button>

  <main id="main" class="main" role="main">
    <section aria-labelledby="cp-title">
      <div class="container">
        <div class="tool-header">
          <a href="index.html" class="back-link" aria-label="返回首頁"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg><span data-i18n="back">返回</span></a>
          <h1 id="cp-title" data-i18n="tools.centerPad.title">置中補白邊</h1>
        </div>
        <div class="tool-layout">
          <div class="tool-sidebar">
            <div class="upload-zone" id="cp-upload" role="button" tabindex="0" aria-label="點擊或拖曳圖片上傳">
              <input type="file" accept="image/*" class="upload-input" id="cp-file" aria-label="選擇圖片檔案" multiple>
              <div class="upload-content">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <p class="upload-text" data-i18n="upload.text">點擊或拖曳圖片至此</p>
                <p class="upload-hint" data-i18n="upload.hint">支援 JPG、PNG、WebP</p>
              </div>
            </div>
            <div class="settings-panel" id="cp-settings" hidden>
              <h2 class="settings-title" data-i18n="settings">設定</h2>
              <div class="setting-group">
                <label for="cp-ratio" data-i18n="centerPad.ratio">目標比例</label>
                <select id="cp-ratio" class="select-input">
                  <option value="1:1" data-i18n="ratio.1to1">1:1 正方形</option>
                  <option value="4:5" data-i18n="ratio.4to5">4:5 Instagram 直式</option>
                  <option value="16:9" data-i18n="ratio.16to9">16:9 橫式</option>
                  <option value="9:16" data-i18n="ratio.9to16">9:16 限時動態</option>
                  <option value="custom" data-i18n="ratio.custom">自訂</option>
                </select>
              </div>
              <div class="setting-group" id="cp-custom-ratio" hidden>
                <label data-i18n="centerPad.customRatio">自訂比例</label>
                <div class="inline-inputs">
                  <input type="number" id="cp-ratio-w" class="number-input" value="1" min="1" max="100" aria-label="寬度比例">
                  <span>:</span>
                  <input type="number" id="cp-ratio-h" class="number-input" value="1" min="1" max="100" aria-label="高度比例">
                </div>
              </div>
              <div class="setting-group">
                <label for="cp-bg-color" data-i18n="centerPad.bgColor">背景顏色</label>
                <div class="color-picker-row">
                  <input type="color" id="cp-bg-color" class="color-input" value="#ffffff" aria-label="選擇背景顏色">
                  <span class="color-label" id="cp-color-label">#FFFFFF</span>
                  <button class="btn-small" id="cp-bg-white" aria-label="設為白色">白</button>
                  <button class="btn-small" id="cp-bg-black" aria-label="設為黑色">黑</button>
                </div>
              </div>
              <div class="setting-group">
                <label for="cp-padding" data-i18n="centerPad.padding">額外內距</label>
                <div class="range-row">
                  <input type="range" id="cp-padding" class="range-input" min="0" max="200" value="0" aria-label="額外內距像素">
                  <output for="cp-padding" id="cp-padding-val">0px</output>
                </div>
              </div>
              <div class="btn-group">
                <button class="btn btn-primary" id="cp-process" data-i18n="btn.process">處理圖片</button>
                <button class="btn btn-secondary" id="cp-reset" data-i18n="btn.reset">重設</button>
              </div>
            </div>
          </div>
          <div class="preview-area" id="cp-preview-area" hidden>
            <h2 class="sr-only" data-i18n="preview">預覽</h2>
            <div class="preview-container"><canvas id="cp-canvas" aria-label="圖片預覽"></canvas></div>
            <div class="preview-info" id="cp-info"></div>
            <div class="btn-group">
              <button class="btn btn-primary" id="cp-download" data-i18n="btn.download">下載圖片</button>
              <button class="btn btn-secondary" id="cp-download-all" data-i18n="btn.downloadAll" hidden>全部下載</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

        <a href="privacy.html" class="footer-link" data-i18n="nav.privacy">隱私政策</a>
        <span class="footer-sep" aria-hidden="true">|</span>

      </div>
      <p data-i18n="footer.text">ToolWeb — 所有圖片皆於瀏覽器端處理，不會上傳至伺服器。</p>
    </div>

  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script src="shared.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const { t, showToast, loadImage, canvasToBlob, downloadBlob, showProcessing, hideProcessing, setupUploadZone } = ToolWeb;
    let images = [], currentIndex = 0;
    setupUploadZone('cp-upload', 'cp-file', async (files) => {
      images = [];
      for (const f of files) { if (!f.type.startsWith('image/')) continue; images.push({ file: f, img: await loadImage(f) }); }
      if (!images.length) return;
      document.getElementById('cp-settings').hidden = false;
      document.getElementById('cp-download-all').hidden = images.length <= 1;
      showToast(t('toast.uploaded'), 'success');
    });
    const setColor = hex => { document.getElementById('cp-bg-color').value = hex; document.getElementById('cp-color-label').textContent = hex.toUpperCase(); };
    document.getElementById('cp-ratio').addEventListener('change', () => { document.getElementById('cp-custom-ratio').hidden = document.getElementById('cp-ratio').value !== 'custom'; });
    document.getElementById('cp-bg-color').addEventListener('input', e => { document.getElementById('cp-color-label').textContent = e.target.value.toUpperCase(); });
    document.getElementById('cp-bg-white').addEventListener('click', () => setColor('#ffffff'));
    document.getElementById('cp-bg-black').addEventListener('click', () => setColor('#000000'));
    document.getElementById('cp-padding').addEventListener('input', e => { document.getElementById('cp-padding-val').textContent = e.target.value + 'px'; });
    function getRatio() {
      const val = document.getElementById('cp-ratio').value;
      if (val === 'custom') { return (parseInt(document.getElementById('cp-ratio-w').value)||1)/(parseInt(document.getElementById('cp-ratio-h').value)||1); }
      const [w,h] = val.split(':').map(Number); return w/h;
    }
    function processOne(img) {
      const ratio = getRatio(), padding = parseInt(document.getElementById('cp-padding').value)||0, bgColor = document.getElementById('cp-bg-color').value;
      const iw = img.naturalWidth, ih = img.naturalHeight, pw = iw+padding*2, ph = ih+padding*2;
      let cw, ch;
      if (pw/ph > ratio) { cw = pw; ch = Math.round(pw/ratio); } else { ch = ph; cw = Math.round(ph*ratio); }
      const c = document.createElement('canvas'); c.width=cw; c.height=ch;
      const ctx = c.getContext('2d'); ctx.fillStyle=bgColor; ctx.fillRect(0,0,cw,ch);
      ctx.drawImage(img, Math.round((cw-iw)/2), Math.round((ch-ih)/2));
      return c;
    }
    document.getElementById('cp-process').addEventListener('click', async () => {
      if (!images.length) { showToast(t('toast.noFile'),'error'); return; }
      showProcessing(); await new Promise(r=>setTimeout(r,50));
      try {
        const c = processOne(images[0].img), pc = document.getElementById('cp-canvas');
        pc.width=c.width; pc.height=c.height; pc.getContext('2d').drawImage(c,0,0);
        document.getElementById('cp-preview-area').hidden=false;
        document.getElementById('cp-info').textContent=t('info.size',{w:c.width,h:c.height});
        showToast(t('toast.processed'),'success');
      } catch(e) { showToast(t('toast.error'),'error'); }
      hideProcessing();
    });
    document.getElementById('cp-download').addEventListener('click', async () => {
      if (!images.length) return;
      const c = processOne(images[currentIndex].img), blob = await canvasToBlob(c,'png');
      downloadBlob(blob, images[currentIndex].file.name.replace(/\.[^.]+$/,'')+'_padded.png');
      showToast(t('toast.downloaded'),'success');
    });
    document.getElementById('cp-download-all').addEventListener('click', async () => {
      showProcessing();
      for (let i=0;i<images.length;i++) { const c=processOne(images[i].img); downloadBlob(await canvasToBlob(c,'png'), images[i].file.name.replace(/\.[^.]+$/,'')+'_padded.png'); }
      hideProcessing(); showToast(t('toast.downloaded'),'success');
    });
    document.getElementById('cp-reset').addEventListener('click', () => {
      images=[]; currentIndex=0; document.getElementById('cp-file').value='';
      document.getElementById('cp-settings').hidden=true; document.getElementById('cp-preview-area').hidden=true;
      document.getElementById('cp-upload').classList.remove('has-file');
      const n=document.querySelector('#cp-upload .upload-filename'); if(n) n.remove();
    });
  });
  </script>
</body>
