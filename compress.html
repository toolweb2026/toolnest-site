  <main id="main" class="main" role="main">
    <section aria-labelledby="cm-title">
      <div class="container">
        <div class="tool-header">
          <a href="index.html" class="back-link" aria-label="返回首頁"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg><span data-i18n="back">返回</span></a>
          <h1 id="cm-title" data-i18n="tools.compress.title">圖片壓縮</h1>
        </div>
        <div class="tool-layout">
          <div class="tool-sidebar">
            <div class="upload-zone" id="cm-upload" role="button" tabindex="0" aria-label="點擊或拖曳圖片上傳">
              <input type="file" accept="image/*" class="upload-input" id="cm-file" aria-label="選擇圖片檔案" multiple>
              <div class="upload-content"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><p class="upload-text" data-i18n="upload.text">點擊或拖曳圖片至此</p><p class="upload-hint" data-i18n="upload.hint">支援 JPG、PNG、WebP</p></div>
            </div>
            <div class="settings-panel" id="cm-settings" hidden>
              <h2 class="settings-title" data-i18n="settings">設定</h2>
              <div class="setting-group"><label for="cm-quality" data-i18n="compress.quality">壓縮品質</label>
                <div class="range-row"><input type="range" id="cm-quality" class="range-input" min="10" max="100" value="80" aria-label="壓縮品質百分比"><output for="cm-quality" id="cm-quality-val">80%</output></div>
              </div>
              <div class="setting-group"><label for="cm-format" data-i18n="compress.outputFormat">輸出格式</label>
                <select id="cm-format" class="select-input"><option value="jpeg">JPEG</option><option value="webp">WebP</option><option value="png">PNG</option></select>
              </div>
              <div class="setting-group"><label for="cm-max-width" data-i18n="compress.maxWidth">最大寬度 (px，選填)</label>
                <input type="number" id="cm-max-width" class="number-input full" min="0" max="10000" placeholder="不限制" aria-label="最大寬度像素">
              </div>
              <div class="btn-group"><button class="btn btn-primary" id="cm-process" data-i18n="btn.compress">壓縮圖片</button><button class="btn btn-secondary" id="cm-reset" data-i18n="btn.reset">重設</button></div>
            </div>
          </div>
          <div class="preview-area" id="cm-preview-area" hidden>
            <h2 class="sr-only" data-i18n="preview">預覽</h2>
            <div class="compress-results" id="cm-results"></div>
            <div class="btn-group"><button class="btn btn-primary" id="cm-download-all" data-i18n="btn.downloadAll">全部下載</button></div>
          </div>

  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script src="shared.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const { t, showToast, loadImage, canvasToBlob, downloadBlob, showProcessing, hideProcessing, setupUploadZone, formatBytes } = ToolWeb;
    let files=[], results=[];
    setupUploadZone('cm-upload','cm-file', (fl)=>{
      files=Array.from(fl).filter(f=>f.type.startsWith('image/'));
      if(!files.length) return; document.getElementById('cm-settings').hidden=false;
      showToast(t('toast.uploaded'),'success');
    });
    document.getElementById('cm-quality').addEventListener('input',e=>{document.getElementById('cm-quality-val').textContent=e.target.value+'%';});
    document.getElementById('cm-process').addEventListener('click', async()=>{
      if(!files.length){showToast(t('toast.noFile'),'error');return;} showProcessing(); results=[];
      const quality=parseInt(document.getElementById('cm-quality').value)/100, fmt=document.getElementById('cm-format').value, maxW=parseInt(document.getElementById('cm-max-width').value)||0;
      try{
        for(const f of files){
          const im=await loadImage(f); let w=im.naturalWidth,h=im.naturalHeight;
          if(maxW>0&&w>maxW){h=Math.round(h*(maxW/w));w=maxW;}
          const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';ctx.drawImage(im,0,0,w,h);
          const blob=await canvasToBlob(c,fmt,quality);
          results.push({canvas:c,blob,originalSize:f.size,compressedSize:blob.size,name:f.name});
          URL.revokeObjectURL(im.src);
        }
        renderResults(fmt); document.getElementById('cm-preview-area').hidden=false;
        showToast(t('toast.processed'),'success');
      }catch(e){showToast(t('toast.error'),'error');} hideProcessing();
    });
    function renderResults(fmt){
      const ct=document.getElementById('cm-results');ct.innerHTML='';const ext=fmt==='jpeg'?'jpg':fmt;
      results.forEach((r,i)=>{
        const saved=Math.max(0,Math.round((1-r.compressedSize/r.originalSize)*100));
        const item=document.createElement('div');item.className='compress-item';
        item.innerHTML=`<canvas class="compress-thumb" width="64" height="64" aria-hidden="true"></canvas>
          <div class="compress-details"><div class="compress-name">${r.name}</div>
          <div class="compress-stats"><span>${t('info.original',{s:formatBytes(r.originalSize)})}</span><span>${t('info.compressed',{s:formatBytes(r.compressedSize)})}</span><span class="compress-saved">${t('info.saved',{p:saved})}</span></div></div>
          <div class="compress-actions"><button class="btn btn-primary">${t('btn.download')}</button></div>`;
        const tc=item.querySelector('.compress-thumb').getContext('2d'),sc=Math.min(64/r.canvas.width,64/r.canvas.height);
        tc.drawImage(r.canvas,(64-r.canvas.width*sc)/2,(64-r.canvas.height*sc)/2,r.canvas.width*sc,r.canvas.height*sc);
        item.querySelector('.btn').addEventListener('click',()=>{downloadBlob(r.blob,r.name.replace(/\.[^.]+$/,'')+'_compressed.'+ext);showToast(t('toast.downloaded'),'success');});
        ct.appendChild(item);
      });
    }
    document.getElementById('cm-download-all').addEventListener('click', async()=>{
      const fmt=document.getElementById('cm-format').value,ext=fmt==='jpeg'?'jpg':fmt;
      for(const r of results){downloadBlob(r.blob,r.name.replace(/\.[^.]+$/,'')+'_compressed.'+ext);await new Promise(r=>setTimeout(r,100));}
      showToast(t('toast.downloaded'),'success');
    });
    document.getElementById('cm-reset').addEventListener('click',()=>{
      files=[];results=[];document.getElementById('cm-file').value='';document.getElementById('cm-settings').hidden=true;
      document.getElementById('cm-preview-area').hidden=true;document.getElementById('cm-results').innerHTML='';
      document.getElementById('cm-upload').classList.remove('has-file');
      const n=document.querySelector('#cm-upload .upload-filename');if(n)n.remove();
    });
  });
  </script>
